# Quake-on-TamaGo build + launch tasks.
#
# `task build` produces a bare-metal tamago/amd64 ELF that the QEMU
# launcher boots as -kernel. `task qemu` runs it headless + captures
# a screendump via the QEMU monitor. `task qemu-visible` runs with
# a real GTK window so a human can see Quake actually running.
#
# Requires:
#   - $TAMAGO pointing at tannevaled/tamago-go/bin/go (or any tamago
#     toolchain). Defaults to ~/Documents/VCS/GIT/github.com/tannevaled/tamago-go/bin/go.
#   - qemu-system-x86_64 in PATH.
#   - python3 in PATH (only for headless screendump task).

version: "3"

vars:
  TAMAGO:
    sh: echo "${TAMAGO:-$HOME/Documents/VCS/GIT/github.com/tannevaled/tamago-go/bin/go}"
  ELF: '{{.TASKFILE_DIR}}/build/quake.elf'
  PPM: '/tmp/quake-frame.ppm'
  SERIAL: '/tmp/quake-serial.log'
  MON: '/tmp/quake-mon.sock'
  WAV: '/tmp/quake-audio.wav'   # PCM capture from virtio-sound (qemu-headless)
  CPU: '{{default "max" .CPU}}'
  MEM: '{{default "2G" .MEM}}'  # tamago boot fails silently with < 1G; 2G mirrors validate/run.sh

tasks:
  build:
    desc: Build the tamago/amd64 Quake-on-bare-metal ELF.
    cmds:
      - mkdir -p {{.TASKFILE_DIR}}/build
      - |
        GOWORK=off GOOS=tamago GOARCH=amd64 \
          GOOSPKG=github.com/usbarmory/tamago \
          "{{.TAMAGO}}" build \
          -ldflags "-T 0x10010000 -R 0x1000" \
          -o "{{.ELF}}" .

  qemu-visible:
    desc: Run Quake in QEMU with a native window (cocoa on darwin, gtk on linux), resizable + zoom-to-fit.
    deps: [build]
    vars:
      # Darwin: cocoa supports `zoom-to-fit=on` and is resizable by default.
      # Linux: gtk supports both. Both wrap the framebuffer (default 1280x1024)
      # and rescale to the user-resized window dimensions.
      DISPLAY:
        sh: 'case "$(uname -s)" in Darwin) echo "cocoa,zoom-to-fit=on" ;; *) echo "gtk,zoom-to-fit=on" ;; esac'
    cmds:
      - |
        qemu-system-x86_64 -M q35 -accel tcg -cpu {{.CPU}} -m {{.MEM}} \
          -display {{.DISPLAY}} \
          -no-reboot -vga none \
          -device virtio-gpu-pci,id=vgpu,xres=1280,yres=1024 \
          -device virtio-keyboard-pci,id=vkbd \
          -device virtio-mouse-pci,id=vmouse \
          -device virtio-sound-pci,id=vsnd,audiodev=audio0 \
          -audiodev none,id=audio0 \
          -serial stdio \
          -kernel "{{.ELF}}"

  qemu-playable:
    desc: Run Quake in QEMU interactively (window + virtio-keyboard + virtio-mouse). Identical wiring to qemu-visible; named to make the "I want to play it" intent explicit. The engine auto-disables the demo-orbit override on the first observed key event so W/A/S/D + mouse-look take over from the panorama immediately, no flag needed.
    deps: [build]
    vars:
      DISPLAY:
        sh: 'case "$(uname -s)" in Darwin) echo "cocoa,zoom-to-fit=on" ;; *) echo "gtk,zoom-to-fit=on" ;; esac'
    cmds:
      - |
        qemu-system-x86_64 -M q35 -accel tcg -cpu {{.CPU}} -m {{.MEM}} \
          -display {{.DISPLAY}} \
          -no-reboot -vga none \
          -device virtio-gpu-pci,id=vgpu,xres=1280,yres=1024 \
          -device virtio-keyboard-pci,id=vkbd \
          -device virtio-mouse-pci,id=vmouse \
          -device virtio-sound-pci,id=vsnd,audiodev=audio0 \
          -audiodev none,id=audio0 \
          -serial stdio \
          -kernel "{{.ELF}}"

  qemu-vnc:
    desc: Run Quake in QEMU with a VNC server on :5900 (connect via any VNC viewer).
    deps: [build]
    cmds:
      - echo "VNC listening on localhost:5900 (display :0)"
      - |
        qemu-system-x86_64 -M q35 -accel tcg -cpu {{.CPU}} -m {{.MEM}} \
          -display vnc=:0 \
          -no-reboot -vga none \
          -device virtio-gpu-pci,id=vgpu \
          -device virtio-keyboard-pci,id=vkbd \
          -device virtio-mouse-pci,id=vmouse \
          -serial stdio \
          -kernel "{{.ELF}}"

  qemu-headless:
    desc: Boot in QEMU headless + capture one screendump after 5 seconds + capture virtio-sound PCM output to a WAV.
    deps: [build]
    cmds:
      - rm -f "{{.PPM}}" "{{.SERIAL}}" "{{.MON}}" "{{.WAV}}"
      - |
        # virtio-sound output captured via -audiodev wav,path=...: QEMU
        # mixes every running playback stream into a single 44.1 kHz
        # stereo PCM and writes it as a WAV file. With the engine wired
        # to drive sound + ambientsound through virtio-sound, this WAV
        # is the autonomous-visual-verification (autonomous-audio-
        # verification) artefact -- a non-silent WAV proves the engine
        # actually emitted PCM, not just that the mixer ticked.
        qemu-system-x86_64 -M q35 -accel tcg -cpu {{.CPU}} -m {{.MEM}} \
          -display none -no-reboot -vga none \
          -device virtio-gpu-pci,id=vgpu \
          -device virtio-keyboard-pci,id=vkbd \
          -device virtio-mouse-pci,id=vmouse \
          -device virtio-sound-pci,id=vsnd,audiodev=audio0 \
          -audiodev wav,id=audio0,path={{.WAV}} \
          -serial "file:{{.SERIAL}}" \
          -monitor "unix:{{.MON}},server,nowait" \
          -kernel "{{.ELF}}" &
        QPID=$!
        sleep 5
        # Capture screendump via QEMU monitor (python3 talks to the unix socket).
        python3 -c "
        import socket, time
        s = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
        s.connect('{{.MON}}')
        time.sleep(0.3)
        s.recv(65536)
        s.sendall(b'screendump {{.PPM}} vgpu 0\n')
        time.sleep(0.6)
        print(s.recv(65536).decode(errors='replace').strip())
        "
        kill $QPID 2>/dev/null || true
        wait $QPID 2>/dev/null || true
      - test -s "{{.PPM}}" && echo "wrote {{.PPM}} ($(wc -c < {{.PPM}}) bytes)"
      - test -s "{{.WAV}}" && echo "wrote {{.WAV}} ($(wc -c < {{.WAV}}) bytes)" || echo "WAV not captured (virtio-sound not driven)"

  capture-waypoints:
    desc: Boot QEMU headless + capture one PPM per demo-orbit waypoint (4 PPMs to /tmp/quake-orbit-NN.ppm).
    deps: [build]
    cmds:
      - "{{.TASKFILE_DIR}}/capture_waypoints.sh"

  clean:
    desc: Remove build artifacts + any captured PPM/log files.
    cmds:
      - rm -rf {{.TASKFILE_DIR}}/build
      - rm -f {{.PPM}} {{.SERIAL}} {{.MON}} {{.WAV}}
      - rm -f /tmp/quake-orbit-*.ppm /tmp/quake-orbit-serial.log /tmp/quake-orbit-mon.sock
