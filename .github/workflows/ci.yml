# go-quake1/engine CI — vet, gofmt, and a per-package coverage gate that
# RUNS the test suite on every 64-bit arch the engine supports (amd64,
# arm64, riscv64, loong64, ppc64le, s390x). The renderer / bspfile / msg
# packages all touch little-endian-encoded data structures and the engine
# itself runs on every Go 64-bit target — running the tests under s390x
# emulation makes the byte-order paths a genuine cross-arch check.
#
# Native runners cover amd64 (ubuntu-latest) and arm64 (ubuntu-24.04-arm).
# The remaining little-endian arches plus big-endian s390x run as
# cross-compiled test binaries under QEMU via tonistiigi/binfmt.
#
# CGO=0. GOWORK=off (the engine is a standalone module, no workspace).
#
# Excluded from the package globs: `reference` (vendored C source, not
# Go), and `quake-tamago` + `backend/virtio/realdev` (the bare-metal
# TamaGo target + its adapter, which `replace`-depend on local-only
# go-virtio/usbarmory sibling checkouts absent on CI runners; they build
# only in the developer's multi-repo workspace).
#
# Coverage gate: 100% on every Go package. The bsptrace 87.8% floor
# exception was removed once the synthetic-hull backfill landed: the
# upstream tyrquake backoff loop turned out to be unreachable in the
# Go port's input domain (bias formula proof in bsptrace.go's comment
# block), and dropping it brought the package to 100%.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOWORK: off
  CGO_ENABLED: 0

jobs:
  test:
    name: vet + gofmt + per-package coverage gate (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - run: go version

      - name: go vet
        run: go vet $(go list ./... | grep -vE '/(reference|quake-tamago|backend/virtio/realdev)($|/)')

      - name: gofmt
        run: |
          unformatted=$(gofmt -l $(find . -name '*.go' -not -path './reference/*' -not -path './quake-tamago/*' -not -path './backend/virtio/realdev/*'))
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needs to be run on:"
            echo "$unformatted"
            exit 1
          fi

      - name: per-package coverage gate
        run: |
          set -euo pipefail
          fail=0
          for pkg in $(go list ./... | grep -vE '/(reference|quake-tamago|backend/virtio/realdev)($|/)'); do
            pkg_short=$(echo "$pkg" | sed 's|github.com/go-quake1/engine/||')
            out=$(go test -cover "$pkg" 2>&1 | tail -n 1)
            echo "$out"
            # Extract NN.N% (or "no statements")
            pct=$(echo "$out" | grep -oE 'coverage: [0-9.]+%' | grep -oE '[0-9.]+' || echo "")
            if [ -z "$pct" ]; then
              # "no statements" packages (e.g. anorms is a data table) -- skip the gate
              echo "  -> no statements, skipped"
              continue
            fi
            ok=$(awk -v p="$pct" 'BEGIN { print (p+0 >= 100.0) ? 1 : 0 }')
            if [ "$ok" -ne 1 ]; then
              echo "::error::$pkg_short coverage ${pct}% < 100.0%"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi

  test-arm64:
    name: test (arm64, native)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - run: go version

      - name: go test
        run: go test $(go list ./... | grep -vE '/(reference|quake-tamago|backend/virtio/realdev)($|/)')

  emulated:
    name: test (${{ matrix.arch }}, qemu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: riscv64
            image: debian:trixie
            qemu_cpu: rv64,v=true,vlen=128
          - arch: loong64
            image: ghcr.io/loong64/debian:trixie
            qemu_cpu: la464
          - arch: ppc64le
            image: debian:trixie
            qemu_cpu: power9
          - arch: s390x
            image: debian:trixie
            qemu_cpu: qemu
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - run: go version

      - name: register QEMU binfmt handlers
        run: docker run --privileged --rm tonistiigi/binfmt --install all

      - name: cross-compile test binaries
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          mkdir -p _qemu
          for pkg in $(go list ./... | grep -vE '/(reference|quake-tamago|backend/virtio/realdev)($|/)'); do
            name=$(echo "$pkg" | tr '/.' '__')
            if go test -c -cover -o "_qemu/${name}.test" "$pkg"; then
              echo "built ${name}.test for $pkg"
            else
              echo "no test binary for $pkg (no tests?)"
            fi
          done

      - name: run test binaries under QEMU (${{ matrix.arch }})
        run: |
          set -euo pipefail
          shopt -s nullglob
          bins=(_qemu/*.test)
          if [ ${#bins[@]} -eq 0 ]; then
            echo "::error::no test binaries were built for ${{ matrix.arch }}"
            exit 1
          fi
          for bin in "${bins[@]}"; do
            echo "::group::$bin (${{ matrix.arch }})"
            docker run --rm \
              --platform "linux/${{ matrix.arch }}" \
              -e QEMU_CPU='${{ matrix.qemu_cpu }}' \
              -v "$PWD:/work" -w /work \
              ${{ matrix.image }} \
              "/work/$bin" -test.v
            echo "::endgroup::"
          done
